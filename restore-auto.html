async function autoRestore(){
  const $ = id => document.getElementById(id);
  try{
    $('status').textContent = '데이터 디코딩 중...';
    const binary = atob(DATA_B64);
    const bytes = new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
    const jsonStr = new TextDecoder('utf-8').decode(bytes);
    
    $('status').textContent = '데이터 검증 중...';
    const parsed = JSON.parse(jsonStr);
    const wlCount = Object.keys(parsed.watchlist||{}).length;
    const histCount = (parsed.history||[]).length;
    const bmCount = Object.keys(parsed.bookmarks||{}).filter(k=>parsed.bookmarks[k]).length;
    
    $('status').textContent = 'localStorage에 저장 중...';
    localStorage.setItem('stk_pwa_v1', jsonStr);
    
    $('spinner').style.display = 'none';
    $('title').innerHTML = '<span class="ok">✅ 복원 완료!</span>';
    $('status').innerHTML = '<div class="stats">📊 종목 <b>' + wlCount + '</b>개<br>이력 <b>' + histCount + '</b>건<br>관심종목 <b>' + bmCount + '</b>개</div>3초 후 트래커로 이동합니다...';
    
    const btn = document.createElement('button');
    btn.textContent = '지금 바로 이동';
    btn.onclick = () => location.href = './?restored=' + Date.now();
    document.querySelector('.card').appendChild(btn);
    
    setTimeout(() => location.href = './?restored=' + Date.now(), 3000);
  }catch(e){
    $('spinner').style.display = 'none';
    $('title').innerHTML = '<span class="err">❌ 오류</span>';
    $('status').textContent = e.message;
  }
}
autoRestore();
</script>
