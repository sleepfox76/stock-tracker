    <title>Stock Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
        --bg:#fff;--bg2:#f5f5f5;--bg3:#efefef;
        --text:#111;--text2:#666;--text3:#aaa;
        --border:#e8e8e8;--radius:12px;--radius-sm:8px;
        --primary:#0F1E46;--accent:#E87722;
        --up-text:#2e7d32;--up-bg:#e8f5e9;
        --down-text:#c62828;--down-bg:#ffebee;
        --new-text:#6a1b9a;--new-bg:#f3e5f5;
        --reapp-text:#e65100;--reapp-bg:#fff3e0;
        --count-text:#1565c0;--count-bg:#e3f2fd;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
    .header{background:var(--primary);color:#fff;padding:16px 16px 12px;position:sticky;top:0;z-index:100;}
    .header h1{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
    .header h1 span{color:var(--accent);}
    .header-sub{font-size:12px;opacity:.7;margin-top:2px;}
    .tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:99;}
    .tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;position:relative;}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
    .badge-tab{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#fff;border-radius:10px;font-size:10px;font-weight:700;min-width:18px;height:18px;padding:0 5px;margin-left:4px;}
    .tab-content{display:none;flex:1;flex-direction:column;}
    .tab-content.active{display:flex;}

    /* 입력 탭 */
    .input-area{padding:16px;}
    textarea{width:100%;min-height:200px;border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-size:14px;line-height:1.6;resize:none;outline:none;color:var(--text);background:var(--bg2);}
    textarea:focus{border-color:var(--accent);}
    .btn{border:none;border-radius:var(--radius);padding:14px 20px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;}
    .btn-primary{background:var(--primary);color:#fff;width:100%;margin-top:12px;}
    .btn-primary:active{opacity:.85;}
    .btn-secondary{background:var(--bg3);color:var(--text);}
    .btn-danger{background:#ffebee;color:var(--down-text);}

    /* 통계 카드 */
    .stats-row{display:flex;gap:8px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);}
    .stat-card{flex:1;background:var(--bg);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
    .stat-num{font-size:20px;font-weight:700;}
    .stat-label{font-size:11px;color:var(--text3);margin-top:2px;}

    /* 검색 & 필터 */
    .search-wrap{padding:10px 16px 0;}
    .search-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:20px;font-size:14px;outline:none;background:var(--bg2);}
    .search-input:focus{border-color:var(--accent);}
    .filter-row{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;}
    .filter-row::-webkit-scrollbar{display:none;}
    .filter-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--text2);}
    .filter-btn.on{background:var(--primary);color:#fff;border-color:var(--primary);}

    /* 종목 리스트 */
    .stock-list{flex:1;overflow-y:auto;}
    .stock-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
    .stock-item:active{background:var(--bg2);}
    .stock-info{flex:1;min-width:0;}
    .stock-name{font-size:15px;font-weight:600;display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
    .stock-meta{font-size:12px;color:var(--text3);margin-top:3px;}
    .stock-right{text-align:right;flex-shrink:0;margin-left:12px;}
