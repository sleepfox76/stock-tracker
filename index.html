<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="종목트래커">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1E46">

<title>Stock Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#efefef;
  --text:#111;--text2:#666;--text3:#aaa;
  --border:#e8e8e8;--radius:12px;--radius-sm:8px;
  --primary:#0F1E46;--accent:#E87722;
  --up-text:#2e7d32;--up-bg:#e8f5e9;
  --down-text:#c62828;--down-bg:#ffebee;
  --new-text:#6a1b9a;--new-bg:#f3e5f5;
  --reapp-text:#e65100;--reapp-bg:#fff3e0;
  --count-text:#1565c0;--count-bg:#e3f2fd;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--primary);color:#fff;padding:16px 16px 12px;position:sticky;top:0;z-index:100;}
.header h1{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
.header h1 span{color:var(--accent);}
.header-sub{font-size:12px;opacity:.7;margin-top:2px;}
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:99;}
.tab{flex:1;padding:12px 2px;text-align:center;font-size:11.5px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;touch-action:manipulation;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.badge-tab{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#fff;border-radius:10px;font-size:10px;font-weight:700;min-width:16px;height:16px;padding:0 4px;margin-left:2px;vertical-align:middle;}
.tab-content{display:none;flex:1;flex-direction:column;}
.tab-content.active{display:flex;}
.input-area{padding:16px;}
textarea{width:100%;min-height:200px;border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-size:14px;line-height:1.6;resize:none;outline:none;color:var(--text);background:var(--bg2);}
textarea:focus{border-color:var(--accent);}
.btn-primary{border:none;border-radius:var(--radius);padding:14px 20px;font-size:15px;font-weight:600;cursor:pointer;background:var(--primary);color:#fff;width:100%;margin-top:12px;transition:opacity .2s;touch-action:manipulation;}
.btn-primary:active{opacity:.85;}
.search-wrap{padding:10px 16px 0;}
.search-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:20px;font-size:14px;outline:none;background:var(--bg2);}
.search-input:focus{border-color:var(--accent);}
.filter-row{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--text2);transition:all .15s;touch-action:manipulation;}
.filter-btn.on{background:var(--primary);color:#fff;border-color:var(--primary);}
.stock-list{flex:1;overflow-y:auto;}
.stock-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);transition:background .15s;}
.stock-item:active{background:var(--bg2);}
.stock-info{flex:1;min-width:0;cursor:pointer;}
.stock-name{font-size:15px;font-weight:600;display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.stock-meta{font-size:12px;color:var(--text3);margin-top:3px;}
.stock-right{text-align:right;flex-shrink:0;margin-left:8px;cursor:pointer;}
.stock-target{font-size:15px;font-weight:700;}
.stock-gap{font-size:13px;font-weight:600;margin-top:2px;}
.star-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 6px;flex-shrink:0;line-height:1;color:var(--text3);transition:color .15s;touch-action:manipulation;}
.star-btn.on{color:var(--accent);}
.copy-btn{background:var(--count-bg);color:var(--count-text);border:none;border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;margin-left:6px;white-space:nowrap;transition:opacity .15s;touch-action:manipulation;}
.copy-btn:active{opacity:.7;}
.copy-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(15,30,70,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:400;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
.copy-toast.show{opacity:1;}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600;}
.b-up{background:var(--up-bg);color:var(--up-text);}
.b-down{background:var(--down-bg);color:var(--down-text);}
.b-new{background:var(--new-bg);color:var(--new-text);}
.b-reapp{background:var(--reapp-bg);color:var(--reapp-text);}
.b-count{background:var(--count-bg);color:var(--count-text);}
.b-same{background:#eceff1;color:#546e7a;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;}
.empty-icon{font-size:40px;}
.empty-text{font-size:14px;color:var(--text3);text-align:center;line-height:1.6;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-height:85vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{font-size:22px;color:var(--text3);cursor:pointer;padding:4px 8px;}
.modal-section{padding:16px;border-bottom:1px solid var(--border);}
.modal-label{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.modal-actions{padding:16px;display:flex;gap:8px;}
.btn-bm-add{flex:1;background:var(--bg3);color:var(--text);border:none;border-radius:var(--radius);padding:14px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-bm-remove{flex:1;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:14px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn-bm-remove:active{opacity:.85;}
.btn-del{background:#ffebee;color:var(--down-text);border:none;border-radius:var(--radius);padding:14px 16px;font-size:13px;font-weight:600;cursor:pointer;}
.mini-chart{height:60px;display:flex;align-items:flex-end;}
.chart-bar-wrap{display:flex;align-items:flex-end;gap:3px;height:100%;width:100%;}
.chart-bar{flex:1;background:var(--bg3);border-radius:3px 3px 0 0;min-width:8px;}
.chart-bar.peak{background:var(--accent);}
.history-list{display:flex;flex-direction:column;gap:6px;}
.history-item{display:flex;justify-content:space-between;align-items:center;font-size:13px;}
.history-date{color:var(--text3);}
.history-target{font-weight:600;}
.history-diff{font-size:11px;font-weight:600;padding:1px 6px;border-radius:8px;}
.trend-up{background:var(--up-bg);color:var(--up-text);}
.trend-down{background:var(--down-bg);color:var(--down-text);}
/* 섹터별(긍정/중립/부정) 탭 */
.sec-sentiment-tabs{display:flex;padding:10px 12px;gap:8px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:107px;z-index:98;}
.sec-tab-btn{flex:1;padding:9px 4px;border:none;border-radius:var(--radius-sm);background:var(--bg2);font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;touch-action:manipulation;}
.sec-tab-btn.pos.active{background:#e8f5e9;color:var(--up-text);}
.sec-tab-btn.neu.active{background:#e3f2fd;color:var(--count-text);}
.sec-tab-btn.neg.active{background:#ffebee;color:var(--down-text);}
.sec-count-badge{display:inline-flex;align-items:center;justify-content:center;background:rgba(0,0,0,.1);border-radius:10px;font-size:11px;min-width:20px;height:18px;padding:0 5px;}
.sec-body{flex:1;overflow-y:auto;}
.sec-date-badge{text-align:center;padding:10px;font-size:12px;color:var(--text3);border-bottom:1px solid var(--border);}
</style>
</head>
<body>
<div class="header">
  <h1>STOCK <span>TRACKER</span></h1>
  <div class="header-sub" id="headerSub">관심 종목을 추적하세요</div>
</div>
<div class="tabs">
  <div class="tab active" onclick="sw('input')">입력</div>
  <div class="tab" onclick="sw('stock')">종목별</div>
  <div class="tab" onclick="sw('sector')">섹터별</div>
  <div class="tab" onclick="sw('watch')">관심종목<span class="badge-tab" id="wBadge" style="display:none">0</span></div>
</div>
<div class="tab-content active" id="tab-input">
  <div class="input-area">
    <textarea id="msgInput" placeholder="텔레그램 메시지를 그대로 붙여넣으세요.&#10;&#10;날짜가 여러 개 있어도 날짜별로 자동 분류됩니다."></textarea>
    <button class="btn-primary" onclick="run()">파싱 + 저장</button>
  </div>
</div>
<div class="tab-content" id="tab-stock">
  <div class="search-wrap">
    <input class="search-input" id="ss" placeholder="종목명 검색..." oninput="rs()">
  </div>
  <div class="filter-row" id="sfRow"></div>
  <div class="stock-list" id="sb"></div>
</div>
<div class="tab-content" id="tab-sector">
  <div class="sec-sentiment-tabs" id="secSentimentTabs"></div>
  <div class="sec-body" id="secBody"></div>
</div>
<div class="tab-content" id="tab-watch">
  <div class="stock-list" id="wb"></div>
</div>

    <div class="modal-header">

    </div>

<div class="copy-toast" id="copyToast"></div>

   봇 데이터와 비교 후 조정 예정. 0.05 = ±5% */
const STATUS_THRESHOLD=0.05;

/* 종목명 정규화: zero-width 문자, NBSP, 양끝 공백 제거 */
function normName(s){
  if(s==null)return'';
  return String(s)
    .replace(/[​-‍﻿]/g,'')   /* zero-width spaces, BOM */
    .replace(/ /g,' ')                  /* NBSP → 일반 공백 */
    .replace(/\s+/g,' ')                     /* 연속 공백 1개로 */
    .trim();
}

/* 기존 데이터에 보이지 않는 문자가 끼어 키 불일치가 생긴 경우 복구 */
function migrateNormNames(d){
  if(d.watchlist){
    const fixed={};
    Object.entries(d.watchlist).forEach(([k,v])=>{
      const nk=normName(k);if(!nk)return;
      let nv=(v&&typeof v==='object')?{...v,name:normName(v.name||k)}:v;
      /* targetHistory에서 target 없는 잘못된 항목 정리 */
      if(nv&&Array.isArray(nv.targetHistory)){
        nv.targetHistory=nv.targetHistory.filter(h=>h&&typeof h.target==='number'&&!isNaN(h.target));
      }
      if(fixed[nk]){
        /* 중복 → target/targetHistory가 있는 더 풍부한 데이터를 우선 */
        const cur=fixed[nk];const incoming=nv;
        const score=o=>(o&&o.target?2:0)+(o&&o.targetHistory&&o.targetHistory.length?1:0);
        fixed[nk]=score(incoming)>score(cur)?incoming:cur;
      }else fixed[nk]=nv;
    });
    d.watchlist=fixed;
  }
  if(d.bookmarks){
    const fb={};
    Object.entries(d.bookmarks).forEach(([k,v])=>{const nk=normName(k);if(nk&&v)fb[nk]=true;});
    d.bookmarks=fb;
  }
  if(Array.isArray(d.history)){
    d.history=d.history.map(h=>(h&&h.name)?{...h,name:normName(h.name)}:h);
  }
  if(d.dailySentiment){
    const fds={};
    Object.entries(d.dailySentiment).forEach(([date,sm])=>{
      const fsm={};
      Object.entries(sm||{}).forEach(([n,sent])=>{const nn=normName(n);if(nn)fsm[nn]=sent;});
      fds[date]=fsm;
    });
    d.dailySentiment=fds;
  }
  return d;
}

function lsGet(){
  try{
    const v=localStorage.getItem(SK);
    if(!v)return{watchlist:{},history:[],alerts:[],bookmarks:{},dailySentiment:{}};
    const d=JSON.parse(v);
    if(!d.bookmarks)d.bookmarks={};
    if(!d.dailySentiment)d.dailySentiment={};
    return migrateNormNames(d);
  }catch(e){return{watchlist:{},history:[],alerts:[],bookmarks:{},dailySentiment:{}};}
}
function sv(){try{localStorage.setItem(SK,JSON.stringify(db));}catch(e){}}

function sw(t){
  ['input','stock','sector','watch'].forEach((n,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',n===t);
    document.getElementById('tab-'+n).classList.toggle('active',n===t);
  });
  if(t==='stock'){renderFilterBtns();rs();}
  if(t==='watch')rw();
  if(t==='sector')renderSector();
}

function setSF(f){sFilter=f;renderFilterBtns();rs();}

function renderFilterBtns(){
  const all=Object.values(db.watchlist);
  const today=new Date().toISOString().slice(0,10);
  const counts={all:all.length,up:all.filter(s=>s.status==='up').length,down:all.filter(s=>s.status==='down').length,new:all.filter(s=>s.date===today).length};
  const defs=[{f:'all',label:'전체'},{f:'up',label:'상향'},{f:'down',label:'하향'},{f:'new',label:'신규'}];
  document.getElementById('sfRow').innerHTML=defs.map(b=>'<button class="filter-btn'+(sFilter===b.f?' on':'')+'" onclick="setSF(\''+b.f+'\')">'+b.label+'('+counts[b.f]+')</button>').join('');
}

function getCount(name){
  const s=db.watchlist[name];
  return (s&&s.targetHistory)?s.targetHistory.length:0;
}

function isReappeared(name,currentDate){
  const today=new Date().toISOString().slice(0,10);
  if(currentDate!==today)return false;
  return db.history.some(h=>h.name===name&&h.date<today);
}

  if(isReappeared(s.name,d))b+='<span class="badge b-reapp">재등장🔥</span>';

/* ── 섹터별 탭 (긍정/중립/부정 → 섹터버튼 → 단일 선택 종목 목록) ── */
function getTodayBriefing(){
  /* dailySentiment에서 가장 최근 날짜의 브리핑 사용 */
  const allDates=Object.keys(db.dailySentiment||{}).sort();
  const latestDate=allDates.length?allDates[allDates.length-1]:new Date().toISOString().slice(0,10);
  const sentimentMap=(db.dailySentiment&&db.dailySentiment[latestDate])||{};
  /* 종목 객체 생성: watchlist 데이터 우선, 없으면 최소 구조 */
  const makeObj=name=>{
    const w=db.watchlist[name];
    return w?{...w,sector:w.sector||guessSector(name)}:{name,date:latestDate,sector:guessSector(name)};
  };
  const names=Object.keys(sentimentMap);
  return{
    latestDate,
    positive:names.filter(n=>sentimentMap[n]==='positive').map(makeObj),
    neutral:names.filter(n=>sentimentMap[n]==='neutral'||!sentimentMap[n]).map(makeObj),
    negative:names.filter(n=>sentimentMap[n]==='negative').map(makeObj)
  };
}
function groupBySector(stocks){
  const g={};
  stocks.forEach(s=>{const sec=s.sector||'기타';if(!g[sec])g[sec]=[];g[sec].push(s);});
  return Object.entries(g).sort((a,b)=>b[1].length-a[1].length);
}
function renderSector(){
  const{latestDate,positive,neutral,negative}=getTodayBriefing();
  const counts={positive:positive.length,neutral:neutral.length,negative:negative.length};
  document.getElementById('secSentimentTabs').innerHTML=[
    {key:'positive',label:'긍정',emoji:'📈',cls:'pos'},
    {key:'neutral', label:'중립',emoji:'➡️',cls:'neu'},
    {key:'negative',label:'부정',emoji:'📉',cls:'neg'}
  ].map(t=>'<button class="sec-tab-btn '+t.cls+(secSentiment===t.key?' active':'')+'" onclick="setSecSentiment(\''+t.key+'\')">'+t.emoji+' '+t.label+'<span class="sec-count-badge">'+counts[t.key]+'</span></button>').join('');
  const stocks=secSentiment==='positive'?positive:secSentiment==='negative'?negative:neutral;
  const grouped=groupBySector(stocks);
  const bodyEl=document.getElementById('secBody');
  if(!stocks.length){
    bodyEl.innerHTML='<div class="sec-date-badge">📅 '+latestDate+' 기준</div><div class="empty-state"><div class="empty-icon">'+(secSentiment==='positive'?'📈':secSentiment==='negative'?'📉':'➡️')+'</div><div class="empty-text">'+(secSentiment==='positive'?'긍정':secSentiment==='negative'?'부정':'중립')+' 종목이 없습니다.</div></div>';
    return;
  }
  /* 선택된 섹터 유효성 검사 — 현재 sentiment에 없으면 초기화 */
  if(activeSector&&!grouped.find(([sec])=>sec===activeSector))activeSector='';
  /* 섹터 버튼 */
  const secBtns=grouped.map(([sec,slist])=>{
    const emoji=SE[sec]||'📌';
    return '<button class="filter-btn'+(activeSector===sec?' on':'')+'" onclick="selectSector(\''+sec+'\')">'+emoji+' '+sec+'('+slist.length+')</button>';
  }).join('');
  /* 선택된 섹터의 종목 */
  let stocksHTML='';
  if(activeSector){
    const entry=grouped.find(([sec])=>sec===activeSector);
    if(entry){
      stocksHTML=entry[1].map(s=>stockItemHTML(s)).join('');
    }
  }
  bodyEl.innerHTML=
    '<div class="sec-date-badge">📅 '+latestDate+' 기준 · '+stocks.length+'개 종목</div>'+
    '<div class="filter-row" style="flex-wrap:wrap;">'+secBtns+'</div>'+
    '<div class="stock-list" style="flex:1;">'+stocksHTML+'</div>';
}

function parseText(text){
  const stocks=[];const today=new Date().toISOString().slice(0,10);let curDate=today;
  let curSentiment='neutral'; /* 긍정/중립/부정 구간 추적 */
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);let cur=null;
  const skipW=['기본 통계','중복 추천','높은 괴리율','가격 괴리율','종목 추천 분석','선정된 종목','조건:','총 추천','고유 종목','평균 수익','최고 수익','장 시작 전','핵심 뉴스','투자자 핵심','브리핑'];
  const flush=()=>{if(cur&&cur.name&&cur.target){cur.reason=(cur.reason||'').replace(/\s+/g,' ').trim().substring(0,120);stocks.push({...cur});}cur=null;};
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    const dm=l.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
    if(dm){curDate=toDateStr(dm);continue;}
    if(skipW.some(w=>l.includes(w)))continue;
    const cl=l.replace(/[💰🎯📈📊💡📅✅🔄•━]/g,'').trim();
    /* 감성 구간 감지 — 종목 파싱 중이 아닐 때만 */
    if(!cur){
      const lc=l.replace(/[^가-힣a-zA-Z]/g,'');
      if(/긍정/.test(lc))curSentiment='positive';
      else if(/부정/.test(lc))curSentiment='negative';
      else if(/중립/.test(lc))curSentiment='neutral';
    }
    const nn=l.match(/^(\d+)\.\s+(.+)/);
    if(nn){const nm=normName(nn[2].replace(/\s*\[한경\]\s*/g,''));if(nm.length>0&&nm.length<20&&!nm.includes('투자의견')&&!nm.includes('목표주가')){flush();cur={name:nm,date:curDate,sentiment:curSentiment};continue;}}
    if(!cur)continue;
    const op=cl.match(/투자의견[:\s]*([A-Z매수]+)/);if(op)cur.opinion=op[1].trim();
    const tg=cl.match(/목표주가[:\s]*([\d,]+)원/);if(tg)cur.target=parseInt(tg[1].replace(/,/g,''));
    const pv=cl.match(/전일종가[:\s]*([\d,]+)원/);if(pv)cur.prev=parseInt(pv[1].replace(/,/g,''));
    const gp=cl.match(/상승여력[:\s]*[\d,]+원\s*\(([\d.]+)%\)/);if(gp)cur.gap=parseFloat(gp[1]);
    const rMatch=cl.match(/추천사유[:\s]*(.+)/);
    if(rMatch)cur.reason=(rMatch[1]||'');
    else if(cur.reason!==undefined&&!cl.match(/투자의견|목표주가|전일종가|상승여력/)&&cl.length>2)cur.reason+=' '+cl;
  }
  flush();return{stocks};
}

/* 뉴스 브리핑 파서 —
   시장 영향: 🔵 부정적 ★★★☆☆
   📋 관련 종목: 삼성전자, SK하이닉스, NAVER
   형식을 읽어 {date, sentimentMap:{종목명:'positive'|'neutral'|'negative'}} 반환 */
function parseBriefing(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  let curSentiment='neutral';
  const sentimentMap={};
  let parsedDate=null;
  for(const l of lines){
    const dm=l.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
    if(dm){parsedDate=toDateStr(dm);continue;}
    /* 감성 감지: 긍정적/부정적/중립적 포함 줄 */
    if(/긍정적/.test(l))curSentiment='positive';
    else if(/부정적/.test(l))curSentiment='negative';
    else if(/중립적/.test(l))curSentiment='neutral';
    /* 관련 종목 감지: "관련 종목: 삼성전자, SK하이닉스" */
    const sm=l.match(/관련\s*종목[:\s]*(.+)/);
    if(sm){
      sm[1].split(/[,，、]+/).map(s=>normName(s)).filter(s=>s.length>0&&s.length<=20)
        .forEach(n=>{sentimentMap[n]=curSentiment;});
    }
  }
  const date=parsedDate||new Date().toISOString().slice(0,10);
  return{date,sentimentMap};
}

async function run(){
  const text=document.getElementById('msgInput').value.trim();
  if(!text){showCopyToast('⚠️ 텍스트를 입력하세요');return;}
  const{stocks}=parseText(text);
  if(!stocks.length){showCopyToast('⚠️ 파싱된 종목 없음 — 형식을 확인하세요');return;}
  stocks.forEach(s=>{
    /* 같은 날짜+종목 history 중복 방지 */
    if(!db.history.some(h=>h.name===s.name&&h.date===s.date))db.history.push({...s});
    const ex=db.watchlist[s.name];
    if(!ex){db.watchlist[s.name]={...s,targetHistory:[{date:s.date,target:s.target}],status:'new'};}
    else{
      /* 초기 targetHistory: ex.target이 있을 때만 추가, 없으면 빈 배열 */
      ex.targetHistory=ex.targetHistory||(typeof ex.target==='number'?[{date:ex.date,target:ex.target}]:[]);
      /* 잘못된 항목(target 없음) 정리 */
      ex.targetHistory=ex.targetHistory.filter(h=>h&&typeof h.target==='number'&&!isNaN(h.target));
      if(!ex.targetHistory.find(h=>h.date===s.date&&h.target===s.target))ex.targetHistory.push({date:s.date,target:s.target});
      ex.targetHistory.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
      const h=ex.targetHistory;const latest=h[h.length-1].target;const prev2=h.length>=2?h[h.length-2].target:latest;
      const chg=prev2?(latest-prev2)/prev2:0;
      if(chg>=STATUS_THRESHOLD)ex.status='up';else if(chg<=-STATUS_THRESHOLD)ex.status='down';else ex.status='same';
      Object.assign(ex,{target:latest,prev:s.prev,gap:s.gap,opinion:s.opinion,reason:s.reason,date:s.date,sentiment:s.sentiment||'neutral'});
    }
  });
  /* 뉴스 브리핑 파싱 — 감성+관련종목 추출 후 dailySentiment에 저장 */
  const{date:bDate,sentimentMap}=parseBriefing(text);
  if(Object.keys(sentimentMap).length>0){
    db.dailySentiment[bDate]=sentimentMap;
    /* 브리핑 종목이 watchlist에 없으면 최소 정보로 추가해 섹터 분류 가능하게 */
    Object.keys(sentimentMap).forEach(name=>{
      if(!db.watchlist[name])db.watchlist[name]={name,date:bDate,sector:guessSector(name),sentiment:sentimentMap[name]};
      else db.watchlist[name].sentiment=sentimentMap[name];
    });
  }
  autoClean();sv();upb();updateHeader();renderFilterBtns();
  showCopyToast('✅ '+stocks.length+'개 종목 저장됨'+(Object.keys(sentimentMap).length?' · 브리핑 '+Object.keys(sentimentMap).length+'개':''));
  document.getElementById('msgInput').value='';
  await classifySectors();sw('stock');
}

function updateHeader(){
  const total=Object.keys(db.watchlist).length;
  const dates=[...new Set(db.history.map(s=>s.date).filter(Boolean))];
  document.getElementById('headerSub').textContent=total?'종목 '+total+'개 · '+dates.length+'일 추적중':'관심 종목을 추적하세요';
}

function openDetail(name){
  let s=db.watchlist[name];
  if(!s){
    /* 키 불일치 복구 — 보이지 않는 문자 정규화로 재탐색 */
    const nn=normName(name);
    s=db.watchlist[nn];
    if(!s){
      const found=Object.keys(db.watchlist).find(k=>normName(k)===nn);
      if(found)s=db.watchlist[found];
    }
    if(!s){showCopyToast('⚠️ 종목 데이터를 찾지 못했어요');return;}
    name=s.name||name;
  }
  const cnt=getCount(name);
  document.getElementById('modalTitle').textContent=s.name;
  /* targetHistory에서 target이 없는 항목은 차트/이력에 못 쓰니 제외 */
  const hist=(s.targetHistory||[]).filter(h=>h&&typeof h.target==='number'&&!isNaN(h.target)).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const maxT=hist.length?Math.max(...hist.map(h=>h.target)):(s.target||0);
  const minT=hist.length?Math.min(...hist.map(h=>h.target)):(s.target||0);
  const range=(maxT-minT)||1;
  const bars=hist.map(h=>{const pct=Math.round(((h.target-minT)/range)*80+10);return '<div class="chart-bar'+(h.target===maxT?' peak':'')+'" style="height:'+pct+'%"></div>';}).join('');
  const histRows=hist.slice().reverse().map((h,i,a)=>{const prev=a[i+1];let dh='';if(prev&&typeof prev.target==='number'){const d=h.target-prev.target;if(d>0)dh='<span class="history-diff trend-up">+'+d.toLocaleString()+'</span>';else if(d<0)dh='<span class="history-diff trend-down">'+d.toLocaleString()+'</span>';}return '<div class="history-item"><span class="history-date">'+(h.date||'')+'</span><span class="history-target">'+h.target.toLocaleString()+'원</span>'+dh+'</div>';}).join('');
  const bg=makeBadges(s);const sn=name.replace(/'/g,"\\'");
  const isBookmarked=!!(db.bookmarks&&db.bookmarks[name]);
  document.getElementById('modalBody').innerHTML=
    '<div class="modal-section"><div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;"><div><div style="font-size:24px;font-weight:700">'+(s.target?s.target.toLocaleString()+'원':'-')+'</div><div style="font-size:12px;color:var(--text3)">목표주가</div></div><div><div style="font-size:18px;font-weight:600;color:'+((s.gap||0)>=50?'var(--up-text)':'var(--text)')+'">'+(s.gap?s.gap.toFixed(1)+'%':'-')+'</div><div style="font-size:12px;color:var(--text3)">상승여력</div></div><div><div style="font-size:16px;font-weight:500">'+(s.prev?s.prev.toLocaleString()+'원':'-')+'</div><div style="font-size:12px;color:var(--text3)">'+(s.date||'')+' 기준</div></div><div><div style="font-size:16px;font-weight:700;color:var(--count-text)">'+cnt+'회</div><div style="font-size:12px;color:var(--text3)">총 추천</div></div></div><div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:4px;">'+bg+'</div>'+
    '</div>'+(hist.length>1?'<div class="modal-section"><div class="modal-label">목표가 추이</div><div class="mini-chart"><div class="chart-bar-wrap">'+bars+'</div></div></div>':'')+(hist.length>0?'<div class="modal-section"><div class="modal-label">추적 이력 ('+hist.length+'회)</div><div class="history-list">'+histRows+'</div></div>':'')+(s.reason?'<div class="modal-section"><div class="modal-label">최근 추천사유</div><div style="font-size:13px;color:var(--text2);line-height:1.6">'+s.reason+'</div></div>':'')+
    '<div class="modal-actions">'+(isBookmarked?'<button class="btn-bm-remove" onclick="modalToggleBM(\''+sn+'\')">★ 관심종목 제외</button>':'<button class="btn-bm-add" onclick="modalToggleBM(\''+sn+'\')">☆ 관심종목 추가</button>')+'</div>';
  document.getElementById('modalOverlay').classList.add('open');
}
function modalToggleBM(name){
  if(db.bookmarks[name])delete db.bookmarks[name];else db.bookmarks[name]=true;
  sv();upb();openDetail(name);
  if(document.getElementById('tab-stock').classList.contains('active'))rs();
  if(document.getElementById('tab-watch').classList.contains('active'))rw();
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}
function rmStock(n){
  delete db.watchlist[n];delete db.bookmarks[n];
  sv();upb();updateHeader();rs();rw();
}

function autoClean(){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-180);
  const cutoffStr=cutoff.toISOString().slice(0,10);
  let changed=false;
  Object.keys(db.watchlist).forEach(name=>{
    const s=db.watchlist[name];
    const lastDate=(s.targetHistory&&s.targetHistory.length)?s.targetHistory[s.targetHistory.length-1].date:(s.date||'0000-00-00');
    if(lastDate<cutoffStr){delete db.watchlist[name];if(db.bookmarks)delete db.bookmarks[name];changed=true;}
  });
  if(changed){sv();upb();updateHeader();}
  return changed;
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(r=>r.unregister());});
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

db=lsGet();
Object.values(db.watchlist).forEach(s=>{
  if(s.targetHistory&&s.targetHistory.length>1){
    s.targetHistory.sort((a,b)=>a.date.localeCompare(b.date));
    const h=s.targetHistory;const latest=h[h.length-1].target;const prev=h[h.length-2].target;
    const chg=prev?(latest-prev)/prev:0;
    if(chg>=STATUS_THRESHOLD)s.status='up';else if(chg<=-STATUS_THRESHOLD)s.status='down';else s.status='same';
    s.target=latest;
  }
});
autoClean();
sv();upb();updateHeader();
</script>
